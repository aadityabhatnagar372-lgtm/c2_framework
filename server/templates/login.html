<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RED TEAM C2 | LOGIN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f; --card: #111118; --border: #1e1e2e;
  --red: #e63946; --text: #e2e8f0; --dim: #64748b; --glow: rgba(230,57,70,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Inter', sans-serif; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    height: 100vh;
    overflow: hidden;
}
.login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    text-align: center;
    position: relative;
    z-index: 10;
}
.logo {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--red);
    margin-bottom: 0.5rem;
    letter-spacing: 2px;
}
.subtitle {
    font-size: 0.85rem;
    color: var(--dim);
    margin-bottom: 2rem;
}
input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.85rem 1.25rem;
    border-radius: 10px;
    font-size: 0.9rem;
    outline: none;
    transition: all 0.2s;
    margin-bottom: 1.5rem;
    text-align: center;
    letter-spacing: 2px;
}
input:focus {
    border-color: var(--red);
    box-shadow: 0 0 15px var(--glow);
}
.btn {
    width: 100%;
    background: var(--red);
    color: #fff;
    border: none;
    padding: 0.85rem;
    border-radius: 10px;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 15px var(--glow);
}
.btn:hover {
    filter: brightness(1.2);
    transform: translateY(-1px);
}
.error {
    color: var(--red);
    font-size: 0.8rem;
    margin-bottom: 1rem;
    background: rgba(230,57,70,0.1);
    padding: 0.5rem;
    border-radius: 6px;
}
.bg-glow {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="login-card">
    <div class="logo">&#9762; RED TEAM C2</div>
    <div class="subtitle">Enter access authority credential</div>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="password" name="password" placeholder="••••••••" required autofocus>
        <button type="submit" class="btn">INITIALIZE CONNECTION</button>
    </form>
</div>

</body>
</html>
